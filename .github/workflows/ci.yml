name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # macos-15 ships Xcode 16.x; the project is objectVersion 77 (Xcode 16+).
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: |
          xcodebuild build \
            -project Docky.xcodeproj \
            -scheme Docky \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project Docky.xcodeproj \
            -scheme Docky \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
